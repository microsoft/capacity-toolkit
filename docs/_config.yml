title: Azure Capacity & Enablement Toolkit
description: A read-only-by-default toolkit for validating Azure regional / zonal SKU enablement, quota, capacity and AKS / database footprint using Reader access.
remote_theme: just-the-docs/just-the-docs

# Base hostname and protocol (GitHub Pages project site)
url: https://microsoft.github.io
baseurl: /capacity-toolkit

# Branding
logo: /assets/logo.svg

# Header links
aux_links:
  Capacity toolkit on GitHub:
    - https://github.com/microsoft/capacity-toolkit
aux_links_new_tab: true

# "Edit this page on GitHub" links
gh_edit_link: true
gh_edit_link_text: Edit this page on GitHub
gh_edit_repository: https://github.com/microsoft/capacity-toolkit
gh_edit_branch: main
gh_edit_source: docs
gh_edit_view_mode: edit

# Convert in-repo .md links to site links
relative_links:
  enabled: true

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3

# Syntax highlighting for the languages the docs use
highlighter: rouge
rouge:
  languages:
    - powershell
    - json
    - bicep
    - kusto

# Mermaid diagrams (opt-in per page via ```mermaid fences)
mermaid:
  version: '10.9.1'

# Callouts (Note / Tip / Important / Warning)
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: purple
  warning:
    title: Warning
    color: red

# Footer
back_to_top: true
back_to_top_text: Back to top
last_edit_timestamp: true
last_edit_time_format: '%b %e %Y at %I:%M %p'

# GitHub Pages plugins (all on the Pages allow-list)
plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-seo-tag

# Never process these as site content
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
